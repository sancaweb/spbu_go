{{ define "master/jenis-test/index.html" }} {{ template "header.html" . }}

<!-- Embed server data -->
<script type="application/json" id="_jenisTestsData">
  [{{ range $i, $jt := .JenisTests }}{{ if $i }},{{ end }}{"id":{{ $jt.ID }},"nama_test":{{ js $jt.NamaTest }},"deskripsi":{{ js $jt.Deskripsi }},"is_active":{{ if $jt.IsActive }}true{{ else }}false{{ end }}}{{ end }}]
</script>

<div class="space-y-6" x-data="jenisTestManager()">
  <!-- Header -->
  <div
    class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4"
  >
    <div>
      <h2 class="text-2xl font-bold text-slate-800">{{ .Title }}</h2>
      <p class="text-slate-500 text-sm mt-1">
        Kelola master data jenis pengujian & kalibrasi BBM
      </p>
    </div>
    <button
      @click="openCreateModal()"
      class="px-4 py-2 bg-[#005596] hover:bg-blue-800 text-white rounded-lg font-bold shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4v16m8-8H4"
        ></path>
      </svg>
      Tambah Jenis Test
    </button>
  </div>

  <!-- Table -->
  <div
    class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"
  >
    <div class="overflow-x-auto">
      <table id="jenis-test-table" class="w-full text-sm">
        <thead
          class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider"
        >
          <tr>
            <th class="px-4 py-3 text-left w-8">#</th>
            <th class="px-4 py-3 text-left">Nama Jenis Test</th>
            <th class="px-4 py-3 text-left">Deskripsi</th>
            <th class="px-4 py-3 text-center w-32">Status</th>
            <th class="px-4 py-3 text-center w-28">Aksi</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <template x-if="rows.length === 0">
            <tr>
              <td colspan="5" class="px-4 py-12 text-center text-slate-400">
                <svg
                  class="w-10 h-10 mx-auto mb-2 text-slate-300"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                  ></path>
                </svg>
                Belum ada data jenis test
              </td>
            </tr>
          </template>
          <template x-for="(row, idx) in rows" :key="row.id">
            <tr class="hover:bg-slate-50 transition-colors">
              <td class="px-4 py-3 text-slate-400" x-text="idx + 1"></td>
              <td
                class="px-4 py-3 font-semibold text-slate-800"
                x-text="row.nama_test"
              ></td>
              <td class="px-4 py-3 text-slate-500">
                <span x-show="row.deskripsi" x-text="row.deskripsi"></span>
                <span x-show="!row.deskripsi" class="text-slate-300 italic"
                  >—</span
                >
              </td>
              <!-- Toggle switch (inline, no page reload) -->
              <td class="px-4 py-3 text-center">
                <button
                  @click="toggleActive(row)"
                  :disabled="row.toggling"
                  :title="row.is_active ? 'Klik untuk nonaktifkan' : 'Klik untuk aktifkan'"
                  class="inline-flex items-center gap-2 focus:outline-none disabled:opacity-60"
                >
                  <div
                    class="relative w-10 h-5 rounded-full transition-colors duration-200"
                    :class="row.is_active ? 'bg-green-500' : 'bg-slate-300'"
                  >
                    <div
                      class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-all duration-200"
                      :class="row.is_active ? 'left-5' : 'left-0.5'"
                    ></div>
                    <div
                      x-show="row.toggling"
                      class="absolute inset-0 flex items-center justify-center rounded-full bg-black/20"
                    >
                      <svg
                        class="w-3 h-3 animate-spin text-white"
                        fill="none"
                        viewBox="0 0 24 24"
                      >
                        <circle
                          class="opacity-25"
                          cx="12"
                          cy="12"
                          r="10"
                          stroke="currentColor"
                          stroke-width="4"
                        ></circle>
                        <path
                          class="opacity-75"
                          fill="currentColor"
                          d="M4 12a8 8 0 018-8v8H4z"
                        ></path>
                      </svg>
                    </div>
                  </div>
                  <span
                    class="text-xs font-medium"
                    :class="row.is_active ? 'text-green-700' : 'text-slate-500'"
                    x-text="row.is_active ? 'Aktif' : 'Nonaktif'"
                  ></span>
                </button>
              </td>
              <td class="px-4 py-3 text-center">
                <div class="flex items-center justify-center gap-2">
                  <button
                    @click="openEditModal(row)"
                    class="p-1.5 rounded-lg text-blue-600 hover:bg-blue-50 transition-colors"
                    title="Edit"
                  >
                    <svg
                      class="w-4 h-4"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                      ></path>
                    </svg>
                  </button>
                  <button
                    @click="confirmDelete(row)"
                    class="p-1.5 rounded-lg text-red-500 hover:bg-red-50 transition-colors"
                    title="Hapus"
                  >
                    <svg
                      class="w-4 h-4"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                      ></path>
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Create / Edit Modal -->
  <div
    x-show="showModal"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    style="display: none"
    @click.self="closeModal()"
  >
    <div
      class="bg-white rounded-2xl shadow-xl w-full max-w-md"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      @click.stop
    >
      <!-- Modal Header -->
      <div
        class="flex items-center justify-between px-6 py-4 border-b border-slate-100"
      >
        <h3
          class="text-lg font-semibold text-slate-800"
          x-text="isEdit ? 'Edit Jenis Test' : 'Tambah Jenis Test'"
        ></h3>
        <button
          @click="closeModal()"
          class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="px-6 py-5 space-y-4">
        <!-- Nama Jenis Test -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Nama Jenis Test <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            x-model="form.nama_test"
            @keyup.enter="submit()"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            placeholder="cth. Density Pengawas"
          />
        </div>

        <!-- Deskripsi -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Deskripsi</label
          >
          <textarea
            x-model="form.deskripsi"
            rows="2"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none"
            placeholder="Keterangan singkat mengenai jenis test ini (opsional)"
          ></textarea>
        </div>

        <!-- Status (edit only) -->
        <div x-show="isEdit">
          <label class="block text-sm font-medium text-slate-700 mb-2"
            >Status</label
          >
          <label
            class="inline-flex items-center gap-2 cursor-pointer select-none"
          >
            <input
              type="checkbox"
              x-model="form.is_active"
              class="w-4 h-4 rounded text-blue-600"
            />
            <span class="text-sm text-slate-600">Aktif</span>
          </label>
        </div>
      </div>

      <!-- Modal Footer -->
      <div
        class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-100 bg-slate-50 rounded-b-2xl"
      >
        <button
          @click="closeModal()"
          class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-100 text-sm font-medium transition-colors"
        >
          Batal
        </button>
        <button
          @click="submit()"
          :disabled="isSubmitting"
          class="px-5 py-2 rounded-lg bg-[#005596] hover:bg-blue-800 text-white text-sm font-semibold shadow transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
        >
          <svg
            class="w-4 h-4 animate-spin"
            x-show="isSubmitting"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
            ></path>
          </svg>
          <span
            x-text="isSubmitting ? 'Menyimpan...' : (isEdit ? 'Update' : 'Simpan')"
          ></span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener("alpine:init", function () {
    Alpine.data("jenisTestManager", function () {
      var raw = document.getElementById("_jenisTestsData");
      var initialRows = [];
      try {
        initialRows = JSON.parse(raw ? raw.textContent : "[]");
        initialRows = initialRows.map(function (r) {
          r.toggling = false;
          return r;
        });
      } catch (e) {}

      return {
        rows: initialRows,
        showModal: false,
        isEdit: false,
        isSubmitting: false,
        editID: 0,
        form: {
          nama_test: "",
          deskripsi: "",
          is_active: true,
        },

        openCreateModal: function () {
          this.isEdit = false;
          this.editID = 0;
          this.form = { nama_test: "", deskripsi: "", is_active: true };
          this.showModal = true;
          this.$nextTick(function () {
            var inp = document.querySelector('[x-model="form.nama_test"]');
            if (inp) inp.focus();
          });
        },

        openEditModal: function (row) {
          this.isEdit = true;
          this.editID = row.id;
          this.form = {
            nama_test: row.nama_test,
            deskripsi: row.deskripsi,
            is_active: row.is_active,
          };
          this.showModal = true;
        },

        closeModal: function () {
          this.showModal = false;
        },

        toggleActive: function (row) {
          row.toggling = true;
          fetch("/master/jenis-test/" + row.id + "/toggle", { method: "POST" })
            .then(function (r) {
              return r.json();
            })
            .then(function (res) {
              row.toggling = false;
              if (res.status === "success") {
                row.is_active = res.data.is_active;
              } else {
                Swal.fire({ icon: "error", title: "Gagal", text: res.message });
              }
            })
            .catch(function (e) {
              row.toggling = false;
              Swal.fire({ icon: "error", title: "Error", text: e.message });
            });
        },

        submit: function () {
          var self = this;
          if (!self.form.nama_test.trim()) {
            Swal.fire({
              icon: "warning",
              title: "Periksa Form",
              text: "Nama jenis test wajib diisi",
            });
            return;
          }
          self.isSubmitting = true;

          var url = self.isEdit
            ? "/master/jenis-test/" + self.editID
            : "/master/jenis-test";

          var body = new FormData();
          body.append("nama_test", self.form.nama_test.trim());
          body.append("deskripsi", self.form.deskripsi.trim());
          body.append("is_active", self.form.is_active ? "1" : "0");

          fetch(url, { method: "POST", body: body })
            .then(function (r) {
              return r.json();
            })
            .then(function (res) {
              self.isSubmitting = false;
              if (res.status === "success") {
                Swal.fire({
                  icon: "success",
                  title: "Berhasil",
                  text: res.message,
                  timer: 1500,
                  showConfirmButton: false,
                }).then(function () {
                  var saved = res.data || {};
                  if (self.isEdit) {
                    var idx = self.rows.findIndex(function (r) {
                      return r.id === self.editID;
                    });
                    if (idx >= 0) {
                      self.rows[idx].nama_test = saved.nama_test;
                      self.rows[idx].deskripsi = saved.deskripsi;
                      self.rows[idx].is_active = saved.is_active;
                    }
                  } else {
                    saved.toggling = false;
                    self.rows.push(saved);
                    self.rows.sort(function (a, b) {
                      return String(a.nama_test).localeCompare(String(b.nama_test));
                    });
                  }
                  self.closeModal();
                });
              } else {
                Swal.fire({
                  icon: "error",
                  title: "Gagal",
                  text: res.message || "Terjadi kesalahan",
                });
              }
            })
            .catch(function (e) {
              self.isSubmitting = false;
              Swal.fire({
                icon: "error",
                title: "Error",
                text: "Gagal menghubungi server: " + e.message,
              });
            });
        },

        confirmDelete: function (row) {
          var self = this;
          Swal.fire({
            title: "Hapus Jenis Test?",
            html: "Data <b>" + row.nama_test + "</b> akan dihapus.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#ef4444",
            cancelButtonColor: "#94a3b8",
            confirmButtonText: "Hapus",
            cancelButtonText: "Batal",
          }).then(function (result) {
            if (!result.isConfirmed) return;
            fetch("/master/jenis-test/" + row.id + "/delete", {
              method: "POST",
            })
              .then(function (r) {
                return r.json();
              })
              .then(function (res) {
                if (res.status === "success") {
                  Swal.fire({
                    icon: "success",
                    title: "Terhapus",
                    text: res.message,
                    timer: 1500,
                    showConfirmButton: false,
                  }).then(function () {
                    var idx = self.rows.findIndex(function (r) {
                      return r.id === row.id;
                    });
                    if (idx >= 0) self.rows.splice(idx, 1);
                  });
                } else {
                  Swal.fire({
                    icon: "error",
                    title: "Gagal",
                    text: res.message,
                  });
                }
              })
              .catch(function (e) {
                Swal.fire({ icon: "error", title: "Error", text: e.message });
              });
          });
        },
      };
    });
  });
</script>

{{ template "footer.html" . }} {{ end }}
