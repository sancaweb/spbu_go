{{ define "login.html" }}
{{ template "header.html" . }}

<div class="w-full max-w-md p-8 glass-card rounded-2xl shadow-xl">
    <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-tr from-[#ED1C24] via-[#509E2F] to-[#005596] flex items-center justify-center shadow-lg">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
        <p class="text-slate-500">Sign in to access SPBU Go</p>
    </div>

    {{ if .Error }}
    <div class="bg-red-50 text-red-600 border border-red-200 p-3 rounded-lg mb-6 text-sm flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        {{ .Error }}
    </div>
    {{ end }}
    
    <form action="/login" method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
            <input type="text" name="username" class="w-full p-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#005596] focus:border-[#005596] outline-none transition bg-white/50" placeholder="Enter username" required>
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
            <input type="password" name="password" class="w-full p-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#005596] focus:border-[#005596] outline-none transition bg-white/50" placeholder="••••••••" required>
        </div>
        <button type="submit" class="w-full py-3 rounded-lg bg-gradient-to-r from-[#005596] to-[#509E2F] text-white font-bold shadow-lg hover:opacity-90 transition transform hover:-translate-y-0.5">
            Sign In
        </button>
    </form>
</div>

{{ template "footer.html" . }}
{{ end }}
