{{ define "error.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - SPBU Pertamina Go</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
        <div class="text-[#ED1C24] text-6xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Something Went Wrong</h1>
        <p class="text-slate-500 mb-6">{{ .Error }}</p>
        <a href="/home" class="inline-block px-6 py-2 bg-[#005596] text-white rounded-lg hover:bg-blue-700 transition">Back to Home</a>
    </div>
</body>
</html>
{{ end }}
